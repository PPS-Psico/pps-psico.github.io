<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<!-- Modo claro fijo (sin modo oscuro en el campus) -->
<title>Descargas · PPS 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<style>
@import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap');

#pps-aula-2026{
  --bg:#FAFAF7; --bg-elevated:#FFFFFF; --bg-sunken:#F4F3EE;
  --ink:#141310; --ink-soft:#38362F; --ink-muted:#76736A; --ink-subtle:#A8A498;
  --line:#ECEAE2; --line-strong:#D9D6CB; --hairline:#E5E3DA;
  --accent:#3CB88D; --accent-deep:#25785A; --tint:#EEF6F1;
  --uflo-navy:#203B73; --uflo-deep:#0F1B62;
  --font-display:"Bricolage Grotesque","Geist",system-ui,sans-serif;
  --font-sans:"Geist","Inter",system-ui,sans-serif;
  --font-mono:"Geist Mono",ui-monospace,monospace;
  --t-fast:140ms cubic-bezier(.2,.7,.2,1);
  background:transparent; color:var(--ink); font-family:var(--font-sans);
  font-size:16px; line-height:1.6; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
}
html,body{ margin:0; background:transparent; overflow-x:hidden; }
#pps-aula-2026 *,#pps-aula-2026 *::before,#pps-aula-2026 *::after{ box-sizing:border-box; }
#pps-aula-2026 a{ color:inherit; }

#pps-aula-2026 .pa-display{ font-family:var(--font-display); font-weight:700; letter-spacing:-.04em; line-height:.92; }

/* nav */
#pps-aula-2026 .pa-nav{ display:flex; align-items:center; gap:10px 24px; flex-wrap:wrap; padding:16px 40px; border-bottom:0; background:transparent; }
#pps-aula-2026 .pa-brand{ display:flex; align-items:center; gap:12px; text-decoration:none; color:inherit; }
#pps-aula-2026 .pa-brand__mark{ font-family:var(--font-display); font-weight:700; font-size:22px; letter-spacing:-.06em; }
#pps-aula-2026 .pa-brand__sep{ width:1px; height:22px; background:var(--line); display:inline-block; }
#pps-aula-2026 .pa-navlinks{ display:flex; gap:4px; margin-left:auto; flex-wrap:wrap; }
#pps-aula-2026 .pa-navlinks a{ padding:8px 14px; border-radius:999px; text-decoration:none; color:var(--ink-muted); font-size:14px; font-weight:500; white-space:nowrap; transition:var(--t-fast); }
#pps-aula-2026 .pa-navlinks a:hover{ color:var(--ink); background:var(--bg-sunken); }
#pps-aula-2026 .pa-navlinks a.is-on{ color:var(--bg); background:var(--ink); }

/* masthead */
#pps-aula-2026 .pa-mast{ position:relative; padding:44px 72px 0; max-width:1360px; margin:0 auto; }
#pps-aula-2026 .pa-mast__eyebrow{ display:flex; align-items:center; gap:14px; flex-wrap:wrap; font-family:var(--font-mono); font-size:12px; font-weight:500; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-muted); }
#pps-aula-2026 .pa-mast__eyebrow b{ color:var(--accent-deep); font-weight:600; }
#pps-aula-2026 .pa-mast__eyebrow .sep{ width:4px; height:4px; border-radius:50%; background:var(--line-strong); }
#pps-aula-2026 .pa-mast__title{ font-family:var(--font-display); font-weight:700; font-size:clamp(40px,5.4vw,68px); line-height:.96; letter-spacing:-.045em; color:var(--uflo-deep); margin:22px 0 0; max-width:760px; }
#pps-aula-2026 .pa-mast__sub{ margin:22px 0 0; max-width:560px; font-size:18px; line-height:1.55; color:var(--ink-muted); }

/* lista de descargas */
#pps-aula-2026 .pa-dl-wrap{ max-width:1360px; margin:0 auto; padding:36px 72px 84px; }
#pps-aula-2026 .pa-dl-group + .pa-dl-group{ margin-top:40px; }
#pps-aula-2026 .pa-dl-group__head{ display:flex; align-items:baseline; justify-content:space-between; gap:16px; margin-bottom:14px; }
#pps-aula-2026 .pa-dl-group__title{ margin:0; font-family:var(--font-display); font-weight:700; font-size:24px; letter-spacing:-.03em; color:var(--ink); }
#pps-aula-2026 .pa-dl-group__kick{ font-family:var(--font-mono); font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-subtle); }
#pps-aula-2026 .pa-dl-list{ border:1px solid var(--line); border-radius:18px; overflow:hidden; background:var(--bg-elevated); }
#pps-aula-2026 .pa-dl-row{ display:flex; align-items:center; gap:18px; padding:16px 20px; text-decoration:none; color:var(--ink); border-bottom:1px solid var(--hairline); transition:background var(--t-fast); }
#pps-aula-2026 .pa-dl-row:last-child{ border-bottom:0; }
#pps-aula-2026 .pa-dl-row:hover{ background:var(--bg-sunken); }
#pps-aula-2026 .pa-dl-row:hover .pa-dl-row__dl{ color:var(--accent-deep); border-color:color-mix(in oklab,var(--accent) 40%,var(--line)); }
#pps-aula-2026 .pa-dl-row.is-feat{ background:var(--tint); }
#pps-aula-2026 .pa-dl-row__ext{ width:50px; height:50px; border-radius:13px; flex-shrink:0; display:grid; place-items:center; font-family:var(--font-mono); font-size:11px; font-weight:600; letter-spacing:.02em; background:var(--bg-sunken); border:1px solid var(--line); color:var(--ink-muted); }
#pps-aula-2026 .pa-dl-row__ext.ext-pdf{ color:#B4452F; background:color-mix(in oklab,#B4452F 9%,var(--bg)); border-color:color-mix(in oklab,#B4452F 22%,var(--line)); }
#pps-aula-2026 .pa-dl-row__ext.ext-docx,
#pps-aula-2026 .pa-dl-row__ext.ext-doc{ color:var(--uflo-navy); background:color-mix(in oklab,var(--uflo-navy) 9%,var(--bg)); border-color:color-mix(in oklab,var(--uflo-navy) 22%,var(--line)); }
#pps-aula-2026 .pa-dl-row__ext.ext-xlsx{ color:#1F8A5B; background:color-mix(in oklab,#1F8A5B 10%,var(--bg)); border-color:color-mix(in oklab,#1F8A5B 24%,var(--line)); }
#pps-aula-2026 .pa-dl-row__main{ flex:1; min-width:0; }
#pps-aula-2026 .pa-dl-row__name{ display:block; font-family:var(--font-display); font-weight:600; font-size:16.5px; letter-spacing:-.02em; color:var(--ink); }
#pps-aula-2026 .pa-dl-row__desc{ display:block; font-size:13.5px; color:var(--ink-muted); margin-top:2px; line-height:1.45; }
#pps-aula-2026 .pa-dl-row__size{ font-family:var(--font-mono); font-size:11.5px; color:var(--ink-subtle); letter-spacing:.02em; white-space:nowrap; }
#pps-aula-2026 .pa-dl-row__dl{ width:40px; height:40px; border-radius:11px; flex-shrink:0; display:grid; place-items:center; color:var(--ink-muted); background:var(--bg); border:1px solid var(--line); transition:var(--t-fast); }

@media (max-width:980px){ #pps-aula-2026 .pa-dl-wrap{ padding-left:40px; padding-right:40px; } }
@media (max-width:680px){
  #pps-aula-2026 .pa-nav{ padding:14px 20px; }
  #pps-aula-2026 .pa-mast{ padding:48px 20px 0; }
  #pps-aula-2026 .pa-dl-wrap{ padding:28px 20px 64px; }
  #pps-aula-2026 .pa-dl-row__desc{ display:none; }
  #pps-aula-2026 .pa-dl-row{ gap:12px; padding:14px 16px; }
}

/* ===== POLISH · foco, microinteracciones y entrada ===== */
#pps-aula-2026 a:focus-visible{ outline:2px solid color-mix(in oklab, var(--accent) 55%, transparent); outline-offset:2px; border-radius:12px; }
#pps-aula-2026 .pa-dl-row__dl svg{ transition:transform var(--t-fast); }
#pps-aula-2026 .pa-dl-row:hover .pa-dl-row__dl svg{ transform:translateY(2px); }
#pps-aula-2026 .pa-dl-row__name{ transition:color var(--t-fast); }
#pps-aula-2026 .pa-dl-row:hover .pa-dl-row__name{ color:var(--accent-deep); }
#pps-aula-2026 .pa-dl-row__ext{ transition:transform var(--t-fast); }
#pps-aula-2026 .pa-dl-row:hover .pa-dl-row__ext{ transform:scale(1.05); }
@media (prefers-reduced-motion: no-preference){
  html{ scroll-behavior:smooth; }
  #pps-aula-2026 .pa-anim{ animation:paIn .55s cubic-bezier(.2,.7,.2,1) backwards; }
  @keyframes paIn{ from{ opacity:0; transform:translateY(16px); } to{ opacity:1; transform:none; } }
}
/* ===== MODO OSCURO (toggle manual + auto · paleta navy de Mi Panel PC) ===== */
#pps-aula-2026 .pa-themebtn{ display:inline-flex; align-items:center; justify-content:center; width:38px; height:38px; flex-shrink:0; border-radius:999px; border:1px solid var(--line); background:var(--bg-elevated); color:var(--ink-muted); cursor:pointer; transition:var(--t-fast); }
#pps-aula-2026 .pa-themebtn:hover{ color:var(--ink); border-color:var(--line-strong); background:var(--bg-sunken); transform:translateY(-1px); }
#pps-aula-2026 .pa-themebtn{ display:none!important; }
html[data-theme="dark"] #pps-aula-2026 .pa-themebtn .ic-moon{ display:none; }
html[data-theme="dark"] #pps-aula-2026 .pa-themebtn .ic-sun{ display:inline-flex; }

html[data-theme="dark"]{ background:#0A0E1A; }
html[data-theme="dark"] body{ background:#0A0E1A; }
html[data-theme="dark"] #pps-aula-2026{
  --bg:#0A0E1A; --bg-elevated:#131829; --bg-sunken:#060812;
  --ink:#F2F3F7; --ink-soft:#C6CCDA; --ink-muted:#8C92A4; --ink-subtle:#5C6275;
  --line:#1F2438; --line-strong:#2D344E; --hairline:#222A40;
  --accent:#3CB88D; --accent-deep:#5ECFA3;
  --tint:color-mix(in oklab, var(--accent) 16%, var(--bg));
  --tint-strong:color-mix(in oklab, var(--accent) 26%, var(--bg));
  --uflo-navy:#7B91DE; --uflo-deep:#EDEFF6;
}
html[data-theme="dark"] #pps-aula-2026 .pa-nav{ background:rgba(10,14,26,.86); }
/* === Alineación unificada (barra + contenido comparten contenedor) === */
@media (min-width:1024px){
  #pps-aula-2026 .pa-nav,
  #pps-aula-2026 .pa-mast,
  #pps-aula-2026 .pa-index,
  #pps-aula-2026 .pa-catnav,
  #pps-aula-2026 .pa-body,
  #pps-aula-2026 .pa-foot,
  #pps-aula-2026 .pa-ent-wrap,
  #pps-aula-2026 .pa-dl-wrap{
    max-width:1440px !important;
    margin-left:auto !important; margin-right:auto !important;
    padding-left:56px !important; padding-right:56px !important;
  }
}
/* === Barra unificada con Inicio (un poco más grande) === */
#pps-aula-2026 .pa-brand__mark{ font-size:24px !important; }
#pps-aula-2026 .pa-brand__sep{ height:24px !important; }
#pps-aula-2026 .pa-navlinks{ gap:6px !important; }
#pps-aula-2026 .pa-navlinks a{ padding:9px 17px !important; font-size:15.5px !important; }
@media (min-width:1024px){ #pps-aula-2026 .pa-nav{ padding-top:10px !important; padding-bottom:14px !important; } }
/* ===== POLISH v2 · skill make-interfaces-feel-better: press tactil + transiciones explicitas ===== */
#pps-aula-2026 .pa-navlinks a{ transition:color var(--t-fast), background var(--t-fast), transform var(--t-fast); }
#pps-aula-2026 .pa-dl-row{ transition:background var(--t-fast), transform var(--t-fast); }
#pps-aula-2026 .pa-dl-row__size{ font-variant-numeric:tabular-nums; }
#pps-aula-2026 .pa-mast__title{ text-wrap:balance; }
#pps-aula-2026 .pa-mast__sub,#pps-aula-2026 .pa-dl-row__desc{ text-wrap:pretty; }
@media (prefers-reduced-motion: no-preference){
  #pps-aula-2026 .pa-navlinks a:active{ transform:scale(.95); }
  #pps-aula-2026 .pa-dl-row:active{ transform:scale(.992); }
}

/* === Topbar integrada Campus / Mi Panel === */
#pps-aula-2026 .pa-nav{
  min-height:70px !important;
  align-items:center !important;
  flex-wrap:nowrap !important;
  gap:24px !important;
  padding:10px 40px 14px !important;
}
#pps-aula-2026 .pa-brand{ min-width:190px; }
#pps-aula-2026 .pa-brand__mark{ font-size:24px; }
#pps-aula-2026 .pa-brand__sep{ height:24px; }
#pps-aula-2026 .pa-navlinks{
  align-items:center;
  gap:4px;
  margin-left:auto;
  flex-wrap:nowrap;
}
#pps-aula-2026 .pa-navlinks a{
  padding:9px 15px !important;
  border-radius:10px !important;
  font-size:14.5px !important;
  font-weight:500 !important;
  transition:color var(--t-fast), background var(--t-fast), border-color var(--t-fast), transform var(--t-fast);
}
#pps-aula-2026 .pa-navlinks a.is-on{
  color:var(--bg);
  background:var(--ink);
  font-weight:600 !important;
}
#pps-aula-2026 .pa-navlinks a.pa-bridge{
  margin-left:6px;
  border:1px solid var(--line);
  background:var(--bg-elevated);
  color:var(--ink);
}
#pps-aula-2026 .pa-navlinks a.pa-bridge:hover{
  border-color:var(--line-strong);
  background:var(--bg-sunken);
}
@media (max-width:760px){
  #pps-aula-2026 .pa-nav{ flex-wrap:wrap !important; padding:14px 20px !important; }
  #pps-aula-2026 .pa-brand{ min-width:0; }
  #pps-aula-2026 .pa-navlinks{ order:3; width:100%; overflow-x:auto; padding-bottom:2px; }
}


/* View Transitions: la barra se siente como el mismo objeto entre Campus y Mi Panel. */
@view-transition { navigation: auto; }
#pps-aula-2026 .pa-brand{ view-transition-name:pps-brand; contain:layout; }
#pps-aula-2026 .pa-navlinks{ view-transition-name:pps-tabs; contain:layout; }
#pps-aula-2026 .pa-themebtn{ view-transition-name:pps-actions; contain:layout; }
::view-transition-group(root){ animation-duration:360ms; animation-timing-function:cubic-bezier(.2,.7,.2,1); }
::view-transition-old(root){ animation:ppsPageOut 220ms cubic-bezier(.4,0,1,1) both; }
::view-transition-new(root){ animation:ppsPageIn 360ms cubic-bezier(.16,1,.3,1) both; }
::view-transition-group(pps-brand),::view-transition-group(pps-tabs),::view-transition-group(pps-actions){ animation-duration:420ms; animation-timing-function:cubic-bezier(.16,1,.3,1); }
@keyframes ppsPageOut{ from{ opacity:1; transform:translateY(0); filter:blur(0); } to{ opacity:0; transform:translateY(-6px); filter:blur(2px); } }
@keyframes ppsPageIn{ from{ opacity:0; transform:translateY(10px); filter:blur(3px); } to{ opacity:1; transform:translateY(0); filter:blur(0); } }
@media (prefers-reduced-motion:reduce){ ::view-transition-old(root),::view-transition-new(root),::view-transition-group(root),::view-transition-group(pps-brand),::view-transition-group(pps-tabs),::view-transition-group(pps-actions){ animation-duration:1ms; } }


/* === Masthead editorial unificado con Entregas === */
#pps-aula-2026 .pa-mast{
  padding-top:30px !important;
  max-width:1360px !important;
}
#pps-aula-2026 .pa-mast__eyebrow{
  gap:10px !important;
  font-size:12px !important;
  letter-spacing:.1em !important;
}
#pps-aula-2026 .pa-mast__eyebrow .sep{ display:none !important; }
#pps-aula-2026 .pa-mast__eyebrow .pa-pill{
  display:inline-flex;
  align-items:center;
  min-height:24px;
  padding:4px 10px;
  border-radius:999px;
  border:1px solid var(--line);
  background:var(--bg-elevated);
  color:var(--ink-muted);
}
#pps-aula-2026 .pa-mast__title{
  font-size:clamp(38px,4.55vw,58px) !important;
  line-height:.98 !important;
  letter-spacing:-.045em !important;
  color:var(--ink) !important;
  margin:18px 0 0 !important;
  max-width:760px !important;
}
#pps-aula-2026 .pa-mast__title span{ color:var(--accent-deep); }
#pps-aula-2026 .pa-mast__sub{
  margin:16px 0 0 !important;
  max-width:610px !important;
  font-size:17px !important;
  line-height:1.55 !important;
}
@media (max-width:680px){
  #pps-aula-2026 .pa-mast{ padding:36px 20px 0 !important; }
}
</style>

<body>
<div id="pps-aula-2026">

  <!-- NAV -->
  <header class="pa-nav">
    <a class="pa-brand" href="aula.html">
      <span class="pa-brand__mark">UFLO</span><span class="pa-brand__sep"></span>
      <span class="pa-display" style="font-size:18px;">PPS 2026</span>
    </a>
    <nav class="pa-navlinks">
      <a href="aula.html">Inicio</a>

      <a href="descargas.html" class="is-on">Descargas</a>
      <a href="preguntas.html">Preguntas</a>
      <a href="entregas.html">Entregas</a>
      <a href="/#/student" class="pa-bridge">Mi Panel</a>
    </nav>
    <button class="pa-themebtn" type="button" id="paThemeBtn" aria-label="Cambiar tema" title="Cambiar tema">
      <svg class="ic-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
      <svg class="ic-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
    </button>
  </header>

  <!-- MASTHEAD -->
  <div class="pa-mast">
    <div class="pa-mast__eyebrow"><b>Campus PPS</b><span class="pa-pill">Ciclo 2026</span><span class="pa-pill"><span id="dlCount">…</span> archivos</span></div>
    <h1 class="pa-mast__title">Descargas para <span>tener a mano.</span></h1>
    <p class="pa-mast__sub">Guías, plantillas y documentos oficiales de la práctica. Lo mantenemos actualizado durante toda la cursada.</p>
  </div>

  <div class="pa-dl-wrap" id="dlWrap"></div>
</div>

<!-- ============================================================================
     DATOS — EDITÁ ACÁ (y volvé a desplegar). No hace falta tocar Moodle.
     · ext: PDF | DOC | DOCX | XLSX (define el color del ícono)
     · url: enlace de descarga del archivo
     · size: opcional. Dejalo en "" si no lo sabés (no se muestra)
     · feat:true resalta la fila (destacado)
     ============================================================================ -->
<script id="descargas-data">
window.DESCARGAS = [
  {
    title:"Plantillas", kick:"Documentos que completás vos",
    items:[
      { n:"Planilla de seguimiento de horas", d:"Tu control exacto de horas, clase a clase. Planilla oficial.", ext:"XLSX", size:"", feat:true, url:"descargas/planilla-seguimiento-horas.xlsx" },
      { n:"Planilla de asistencia",            d:"Registro presencial para la firma de tu referente en sede.",   ext:"DOC",  size:"", url:"descargas/planilla-asistencia.doc" }
    ]
  },
  {
    title:"Guías y normativa", kick:"Material de referencia",
    items:[
      { n:"Guía para la elaboración del informe", d:"Pautas de elaboración académica del informe de PPS.", ext:"PDF", size:"", url:"descargas/guia-elaboracion-informe.pdf" },
      { n:"Reglamento de PPS",                    d:"Marco oficial y resoluciones de referencia.",          ext:"PDF", size:"", url:"descargas/reglamento-pps.pdf" }
    ]
  }
];
</script>

<script>
(function(){
  var DATA = window.DESCARGAS || [];
  var DL = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4v12"/><path d="M6 10l6 6 6-6"/><path d="M5 20h14"/></svg>';
  var total = DATA.reduce(function(s,g){ return s + g.items.length; }, 0);
  document.getElementById('dlCount').textContent = total;

  document.getElementById('dlWrap').innerHTML = DATA.map(function(g){
    var rows = g.items.map(function(it){
      return '<a class="pa-dl-row'+(it.feat?' is-feat':'')+'" href="'+(it.url||'#')+'" download target="_blank" rel="noopener">'
        + '<span class="pa-dl-row__ext ext-'+it.ext.toLowerCase()+'">'+it.ext+'</span>'
        + '<span class="pa-dl-row__main"><span class="pa-dl-row__name">'+it.n+'</span>'
        + '<span class="pa-dl-row__desc">'+it.d+'</span></span>'
        + (it.size ? '<span class="pa-dl-row__size">'+it.size+'</span>' : '')
        + '<span class="pa-dl-row__dl">'+DL+'</span></a>';
    }).join('');
    return '<section class="pa-dl-group"><div class="pa-dl-group__head">'
      + '<h2 class="pa-dl-group__title">'+g.title+'</h2>'
      + '<span class="pa-dl-group__kick">'+g.kick+'</span></div>'
      + '<div class="pa-dl-list">'+rows+'</div></section>';
  }).join('');

  if(!(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches)){
    var anim = document.getElementById('pps-aula-2026').querySelectorAll('.pa-mast__eyebrow,.pa-mast__title,.pa-mast__sub,.pa-dl-group__head,.pa-dl-row');
    [].slice.call(anim).forEach(function(el,i){ el.style.animationDelay=((i%7)*45)+'ms'; el.classList.add('pa-anim'); });
  }

  if (window.self !== window.top){ document.documentElement.style.overflow='hidden'; document.body.style.overflow='hidden'; }
  var wrap=document.getElementById('pps-aula-2026');
  function reportH(){ var h=(wrap?Math.ceil(wrap.getBoundingClientRect().height):document.body.scrollHeight)+2; try{ parent.postMessage({ppsAula:true,height:h},'*'); }catch(e){} }
  window.addEventListener('load', reportH); window.addEventListener('resize', reportH);
  if(window.ResizeObserver&&wrap) new ResizeObserver(reportH).observe(wrap);
  var n=0, iv=setInterval(function(){ reportH(); if(++n>12) clearInterval(iv); }, 400);
})();
</script>
<script>
/* Propaga el email (Moodle: aula.html?email=) por el campus vía sessionStorage
   y lo suma a los enlaces de "Mi panel" para el auto-login del panel. */
(function(){
  var PANEL_ORIGIN='https://pps-psico.github.io/';
  function getParam(n){ try{ var v=new URLSearchParams(window.location.search).get(n); return v?v.trim():''; }catch(e){ return ''; } }
  var PANEL_VER='28';
  var email=getParam('email');
  try{ if(email) sessionStorage.setItem('pps_email',email); else email=sessionStorage.getItem('pps_email')||''; }catch(e){}
  document.querySelectorAll('a[href^="'+PANEL_ORIGIN+'"]').forEach(function(a){
    try{ var url=new URL(a.getAttribute('href'),window.location.href); var p=url.pathname.replace(/\/+$/,''); if(p===''||p==='/'){ url.searchParams.set('v',PANEL_VER); if(email) url.searchParams.set('email',email); a.setAttribute('href',url.toString()); } }catch(e){}
  });
})();
</script>
<script>
/* Mantiene el acceso integrado a Mi Panel con el email que inyecta Moodle. */
(function(){
  var PANEL_VER='28';
  function getParam(n){ try{ var v=new URLSearchParams(window.location.search).get(n); return v?v.trim():''; }catch(e){ return ''; } }
  var email=getParam('email');
  try{ if(email) sessionStorage.setItem('pps_email',email); else email=sessionStorage.getItem('pps_email')||''; }catch(e){}
  document.querySelectorAll('a.pa-bridge[href^="/#/student"]').forEach(function(a){
    var qs='?v='+encodeURIComponent(PANEL_VER)+(email?'&email='+encodeURIComponent(email):'');
    a.setAttribute('href','/'+qs+'#/student');
  });
})();
</script>
<script>
/* Precalienta Mi Panel para que la vuelta desde Campus no se sienta como recarga fria (con iframe invisible para precarga real de assets en prod). */
(function(){
  var warmed=false;
  function warmPanel(){
    if(warmed) return;
    warmed=true;
    try{
      var email = '';
      try {
        email = new URLSearchParams(window.location.search).get('email') || sessionStorage.getItem('pps_email') || '';
      } catch(e) {}
      var qs = '?v=28&preload=true' + (email ? '&email=' + encodeURIComponent(email.trim()) : '');

      console.log('[Preheat] Iniciando precarga de Mi Panel en iframe invisible...');
      var iframe = document.createElement('iframe');
      iframe.src = '/' + qs + '#/student';
      iframe.style.position = 'fixed';
      iframe.style.width = '1px';
      iframe.style.height = '1px';
      iframe.style.top = '-9999px';
      iframe.style.left = '-9999px';
      iframe.style.border = 'none';
      iframe.style.opacity = '0';
      iframe.style.pointerEvents = 'none';
      iframe.setAttribute('aria-hidden', 'true');
      iframe.onload = function() {
        console.log('[Preheat] Iframe de precarga cargado exitosamente. Assets cacheados.');
      };
      document.body.appendChild(iframe);
      console.log('[Preheat] Iframe inyectado en DOM con src:', iframe.src);
    }catch(e){
      console.warn('[Preheat] Error al inyectar iframe de precarga:', e);
    }
  }
  document.addEventListener('pointerover',function(e){ if(e.target&&e.target.closest&&e.target.closest('a.pa-bridge')) warmPanel(); },{passive:true});
  document.addEventListener('focusin',function(e){ if(e.target&&e.target.closest&&e.target.closest('a.pa-bridge')) warmPanel(); });
  if('requestIdleCallback' in window) requestIdleCallback(warmPanel,{timeout:1800});
  else setTimeout(warmPanel,900);
})();
</script>
