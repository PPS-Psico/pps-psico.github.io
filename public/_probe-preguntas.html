<!doctype html>
<html lang="es"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Probe · Preguntas embebida</title>
<style>
  html,body{ margin:0; background:#e8e8ef; font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; }
  .bar{ padding:10px 16px; font-size:13px; color:#444; background:#fff; border-bottom:1px solid #ddd; }
  .bar b{ color:#0B0F19; }
  .wrap{ max-width:830px; margin:18px auto; background:#fff; box-shadow:0 12px 40px -20px rgba(20,30,60,.35); }
  #f{ width:100%; border:0; display:block; min-height:300px; background:#FAFAF7; }
  .note{ max-width:830px; margin:10px auto 30px; font-size:13px; color:#555; line-height:1.6; }
</style></head>
<body>
  <div class="bar">PROBE · Preguntas embebida a <b>830px</b> (simula el ancho "limitedwidth" de tu Moodle). Cache-bust real en cada carga.</div>
  <div class="wrap"><iframe id="f" scrolling="no" title="Preguntas frecuentes"></iframe></div>
  <p class="note">Así se ve el centro de ayuda dentro del iframe de Moodle: el alto se ajusta solo (sin scroll interno) vía <code>postMessage</code>. Si ves scroll interno, recargá en incógnito (caché).</p>
<script>
  var f = document.getElementById('f');
  f.src = '/preguntas.html?probe=' + Date.now();   // query nuevo cada vez => sin caché
  window.addEventListener('message', function(e){
    var d = e.data;
    if (d && d.ppsAula && typeof d.height === 'number' && d.height > 200){
      f.style.height = (d.height + 2) + 'px';
    }
  });
</script>
</body></html>
