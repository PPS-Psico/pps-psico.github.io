<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PPS UFLO · Admin · Lanzador</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

<style>
  :root {
    --paper: #F7F5F0;
    --paper-2: #EFECE4;
    --paper-3: #E5E1D7;
    --ink: #14130F;
    --ink-2: #2A2823;
    --ink-3: #6B6660;
    --ink-4: #A8A39C;
    --rule: #1413100F;
    --rule-2: #1413101A;
    --rule-3: #1413102E;
    --accent: #1F3A8A;
    --accent-soft: #1F3A8A14;
    --warn: #B4501E;
    --warn-soft: #B4501E14;
    --ok: #2F5F3A;
    --ok-soft: #2F5F3A14;
    --ai: #5A2D86;
    --ai-soft: #5A2D8612;
  }
  html.dark {
    --paper: #0E0E0C;
    --paper-2: #17171A;
    --paper-3: #1F1F23;
    --ink: #F2EFE8;
    --ink-2: #DAD6CD;
    --ink-3: #97928A;
    --ink-4: #5C5852;
    --rule: #F2EFE810;
    --rule-2: #F2EFE822;
    --rule-3: #F2EFE836;
    --accent: #8FB1FF;
    --accent-soft: #8FB1FF1A;
    --warn: #E4965D;
    --warn-soft: #E4965D1A;
    --ok: #88BD96;
    --ok-soft: #88BD961A;
    --ai: #C9A4F2;
    --ai-soft: #C9A4F21A;
  }
  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  html, body { margin: 0; padding: 0; background: var(--paper); color: var(--ink); font-family: 'Hanken Grotesk', system-ui, sans-serif; font-feature-settings: 'ss01', 'cv11'; }
  body { min-height: 100vh; }

  .serif { font-family: 'Instrument Serif', Georgia, serif; font-weight: 400; letter-spacing: -0.01em; }
  .mono  { font-family: 'JetBrains Mono', ui-monospace, monospace; font-feature-settings: 'zero', 'ss02'; }
  .material-symbols-outlined {
    font-family: 'Material Symbols Outlined', sans-serif;
    font-weight: normal;
    font-style: normal;
    line-height: 1;
    letter-spacing: normal;
    text-transform: none;
    display: inline-block;
    white-space: nowrap;
    word-wrap: normal;
    direction: ltr;
    font-feature-settings: 'liga';
    -webkit-font-smoothing: antialiased;
    font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
  }

  .eyebrow { font-size: 10.5px; letter-spacing: 0.16em; text-transform: uppercase; font-weight: 600; color: var(--ink-3); }
  .label   { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 600; color: var(--ink-3); }
  .meta    { font-size: 12px; color: var(--ink-3); font-variant-numeric: tabular-nums; }

  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 500;
    padding: 8px 14px; border-radius: 999px;
    border: 1px solid var(--rule-2);
    background: transparent; color: var(--ink);
    transition: all .15s ease;
    cursor: pointer; font-family: inherit;
    line-height: 1;
  }
  .btn:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .btn-primary { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .btn-primary:hover { background: var(--ink-2); border-color: var(--ink-2); }
  .btn-ghost { border-color: transparent; padding-left: 8px; padding-right: 8px; }
  .btn-ghost:hover { background: var(--rule-2); color: var(--ink); border-color: transparent; }
  .btn-sm { font-size: 12px; padding: 6px 10px; }
  .btn-ai {
    background: var(--ai-soft); color: var(--ai); border-color: transparent;
  }
  .btn-ai:hover { background: var(--ai); color: var(--paper); border-color: var(--ai); }

  .dot { width: 6px; height: 6px; border-radius: 999px; display: inline-block; }
  .dot-warn { background: var(--warn); }
  .dot-accent { background: var(--accent); }
  .dot-ok { background: var(--ok); }
  .dot-mute { background: var(--ink-4); }
  .dot-ai { background: var(--ai); }
  .dot-rule { background: var(--ink-3); }

  @keyframes pulse-soft {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: .5; transform: scale(1.5); }
  }
  .dot-live { position: relative; }
  .dot-live::after { content: ''; position: absolute; inset: -3px; border-radius: 999px; border: 1px solid currentColor; opacity: .4; animation: pulse-soft 2s infinite; }

  .row-hover { transition: background .15s ease; }
  .row-hover:hover { background: var(--paper-2); }
  ::selection { background: var(--ink); color: var(--paper); }

  /* Inputs */
  .field {
    width: 100%; padding: 10px 12px; border-radius: 8px;
    border: 1px solid var(--rule-2); background: var(--paper);
    color: var(--ink); font-size: 14px; font-family: inherit;
    transition: border-color .15s ease, background .15s ease;
  }
  .field:focus { outline: none; border-color: var(--ink); background: var(--paper); }
  .field::placeholder { color: var(--ink-4); }
  textarea.field { resize: vertical; min-height: 80px; }

  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 999px;
    border: 1px solid var(--rule-2);
    font-size: 12px; color: var(--ink-2);
    cursor: pointer; transition: all .15s ease;
    background: transparent; font-family: inherit;
  }
  .chip:hover { border-color: var(--ink-3); }
  .chip.on { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  /* Sidebar */
  .side-row {
    display: grid; grid-template-columns: 6px 1fr auto; gap: 10px;
    padding: 10px 14px 10px 8px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: background .12s ease, border-color .12s ease;
    align-items: center; min-width: 0;
  }
  .side-row:hover { background: var(--paper-2); }
  .side-row.active { background: var(--paper-2); border-left-color: var(--ink); }
  .side-row.active .side-row-title { color: var(--ink); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--rule-2); border-radius: 999px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--ink-4); }

  /* AI shimmer */
  @keyframes shimmer {
    0% { background-position: -200px 0; }
    100% { background-position: 200px 0; }
  }
  .ai-thinking {
    background: linear-gradient(90deg, var(--ai-soft) 0%, var(--paper-2) 50%, var(--ai-soft) 100%);
    background-size: 400px 100%;
    animation: shimmer 1.6s infinite linear;
  }

  /* Step indicator */
  .step {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--ink-3); font-weight: 500;
  }
  .step-num {
    width: 22px; height: 22px; border-radius: 999px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 11px; font-family: 'JetBrains Mono', monospace; font-weight: 600;
    background: transparent; color: var(--ink-4);
    border: 1px solid var(--rule-2);
  }
  .step.done .step-num { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .step.active .step-num { background: var(--paper); color: var(--ink); border: 1.5px solid var(--ink); }
  .step.active { color: var(--ink); font-weight: 600; }
  .step.done { color: var(--ink-2); }
  .step-bar { width: 32px; height: 1px; background: var(--rule-2); }
  .step-bar.done { background: var(--ink); }

  button:focus-visible, a:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }
  .press:active { transform: translateY(0.5px); }

  /* Topbar responsive */
  @media (max-width: 1180px) {
    .wordmark-sub { display: none; }
    .topbar-search-label { display: none; }
  }
  @media (max-width: 960px) {
    .topbar-user { display: none !important; }
    .topbar-kbd { display: none; }
  }
  @media (max-width: 820px) {
    .topbar-tabs { display: none !important; }
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

</head>
<body>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="lanzador-data.jsx"></script>
<script type="text/babel" src="lanzador-topbar.jsx"></script>
<script type="text/babel" src="lanzador-sidebar.jsx"></script>

<script type="text/babel" src="lanzador-app.jsx"></script>

</body>
</html>
