<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PPS UFLO · Admin · Lanzador</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

<style>
  /* ──────────────────────────────────────────────────────────────────
     PPS LANZADOR · Product register
     Paper/ink base (shared with Inicio) but committed to tool semantics:
     · No italic serif. Headings are bold Hanken with tight tracking.
     · Eyebrows reserved for data labels, not decoration.
     · Status colors carry information (state spectrum + dots/chips).
     · Higher density. Mono for IDs, counts, timing.
     ─────────────────────────────────────────────────────────────── */

  :root {
    --paper:   #F7F5F0;
    --paper-2: #EFECE4;
    --paper-3: #E5E1D7;
    --ink:    #14130F;
    --ink-2:  #2A2823;
    --ink-3:  #6B6660;
    --ink-4:  #A8A39C;
    --rule:   #1413100F;
    --rule-2: #1413101A;
    --rule-3: #1413102E;

    /* Status spectrum — used as dots, eyebrows, soft chip fills */
    --accent:      #1F3A8A;   --accent-soft:      #1F3A8A14;
    --warn:        #B4501E;   --warn-soft:        #B4501E14;
    --ok:          #2F5F3A;   --ok-soft:          #2F5F3A14;
    --ai:          #5A2D86;   --ai-soft:          #5A2D8612;

    /* Convocatoria state → role color (single source of truth) */
    --state-borrador:     var(--ink-4);   --state-borrador-soft:     #14130F0A;
    --state-abierta:      var(--accent);  --state-abierta-soft:      var(--accent-soft);
    --state-cerrada:      var(--warn);    --state-cerrada-soft:      var(--warn-soft);
    --state-seleccionada: var(--ai);      --state-seleccionada-soft: var(--ai-soft);
    --state-activa:       var(--ok);      --state-activa-soft:       var(--ok-soft);
    --state-archivada:    var(--ink-4);   --state-archivada-soft:    #14130F0A;

    /* Orientation palette — adapted from product (#3B82F6, #10B981, #F59E0B,
       #8B5CF6) to a paper-friendly register: same hue family, lower
       saturation, slightly darker so it carries on the warm cream. */
    --orient-clinica:        #3D7A4B;  --orient-clinica-soft:      #3D7A4B14;
    --orient-educacional:    #2E5BA8;  --orient-educacional-soft:  #2E5BA814;
    --orient-laboral:        #A66626;  --orient-laboral-soft:      #A6662614;
    --orient-comunitaria:    #6E429E;  --orient-comunitaria-soft:  #6E429E14;
  }
  html.dark {
    --paper:   #0E0E0C;
    --paper-2: #17171A;
    --paper-3: #1F1F23;
    --ink:    #F2EFE8;
    --ink-2:  #DAD6CD;
    --ink-3:  #97928A;
    --ink-4:  #5C5852;
    --rule:   #F2EFE810;
    --rule-2: #F2EFE822;
    --rule-3: #F2EFE836;

    --accent: #8FB1FF;   --accent-soft: #8FB1FF1A;
    --warn:   #E4965D;   --warn-soft:   #E4965D1A;
    --ok:     #88BD96;   --ok-soft:     #88BD961A;
    --ai:     #C9A4F2;   --ai-soft:     #C9A4F21A;

    --state-borrador-soft:  #F2EFE810;
    --state-archivada-soft: #F2EFE810;

    --orient-clinica:     #88BD96;  --orient-clinica-soft:     #88BD961A;
    --orient-educacional: #8FB1FF;  --orient-educacional-soft: #8FB1FF1A;
    --orient-laboral:     #E4965D;  --orient-laboral-soft:     #E4965D1A;
    --orient-comunitaria: #C9A4F2;  --orient-comunitaria-soft: #C9A4F21A;
  }

  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  html, body { margin: 0; padding: 0; background: var(--paper); color: var(--ink); font-family: 'Hanken Grotesk', system-ui, sans-serif; font-feature-settings: 'ss01', 'cv11'; }
  body { min-height: 100vh; }

  /* ── Type ────────────────────────────────────────────────────────── */

  /* `.serif` in this surface is NOT serif. Bold Hanken with tight tracking
     reads as a confident tool heading. We keep the class so we don't touch
     2300 lines of JSX; we just retune what it means here. */
  .serif {
    font-family: 'Hanken Grotesk', system-ui, sans-serif;
    font-weight: 700;
    letter-spacing: -0.025em;
    font-style: normal;
  }
  /* `<em>` inside `.serif` was the italic-serif emphasis trick. Here it
     becomes an accent-colored bold token — informational, not ornamental. */
  .serif em {
    font-style: normal;
    font-weight: 700;
    color: var(--accent);
  }

  .mono  { font-family: 'JetBrains Mono', ui-monospace, monospace; font-feature-settings: 'zero', 'ss02'; }

  .material-symbols-outlined {
    font-family: 'Material Symbols Outlined', sans-serif;
    font-weight: normal; font-style: normal; line-height: 1;
    letter-spacing: normal; text-transform: none;
    display: inline-block; white-space: nowrap; word-wrap: normal;
    direction: ltr; font-feature-settings: 'liga';
    -webkit-font-smoothing: antialiased;
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  }

  .eyebrow { font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 600; color: var(--ink-3); }
  .label   { font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; font-weight: 600; color: var(--ink-3); }
  .meta    { font-size: 12px; color: var(--ink-3); font-variant-numeric: tabular-nums; }

  /* ── Buttons ─────────────────────────────────────────────────────── */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 500;
    padding: 8px 14px; border-radius: 8px;
    border: 1px solid var(--rule-2);
    background: transparent; color: var(--ink);
    transition: all .12s ease;
    cursor: pointer; font-family: inherit;
    line-height: 1;
  }
  .btn:hover { background: var(--paper-2); border-color: var(--rule-3); }
  .btn-primary { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .btn-primary:hover { background: var(--ink-2); border-color: var(--ink-2); }
  .btn-ghost { border-color: transparent; padding-left: 8px; padding-right: 8px; }
  .btn-ghost:hover { background: var(--rule-2); color: var(--ink); border-color: transparent; }
  .btn-sm { font-size: 12px; padding: 6px 10px; }
  .btn-ai {
    background: var(--ai-soft); color: var(--ai); border-color: transparent;
  }
  .btn-ai:hover { background: var(--ai); color: var(--paper); border-color: var(--ai); }

  /* ── Dots ───────────────────────────────────────────────────────── */
  .dot { width: 8px; height: 8px; border-radius: 999px; display: inline-block; }
  .dot-warn   { background: var(--warn); }
  .dot-accent { background: var(--accent); }
  .dot-ok     { background: var(--ok); }
  .dot-mute   { background: var(--ink-4); }
  .dot-ai     { background: var(--ai); }
  .dot-rule   { background: var(--ink-3); }

  /* State-named dots — preferred where possible */
  .dot-state-borrador     { background: var(--state-borrador); }
  .dot-state-abierta      { background: var(--state-abierta); }
  .dot-state-cerrada      { background: var(--state-cerrada); }
  .dot-state-seleccionada { background: var(--state-seleccionada); }
  .dot-state-activa       { background: var(--state-activa); }
  .dot-state-archivada    { background: var(--state-archivada); }

  @keyframes pulse-soft {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%      { opacity: .5; transform: scale(1.5); }
  }
  .dot-live { position: relative; }
  .dot-live::after { content: ''; position: absolute; inset: -3px; border-radius: 999px; border: 1px solid currentColor; opacity: .4; animation: pulse-soft 2s infinite; }

  /* ── Status chips (the visible-color carriers) ──────────────────── */
  .chip-status {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px 4px 8px; border-radius: 999px;
    font-size: 11.5px; font-weight: 600; letter-spacing: 0.01em;
    line-height: 1; white-space: nowrap;
  }
  .chip-status[data-state="borrador"]     { background: var(--state-borrador-soft);     color: var(--ink-2); }
  .chip-status[data-state="abierta"]      { background: var(--state-abierta-soft);      color: var(--state-abierta); }
  .chip-status[data-state="cerrada"]      { background: var(--state-cerrada-soft);      color: var(--state-cerrada); }
  .chip-status[data-state="seleccionada"] { background: var(--state-seleccionada-soft); color: var(--state-seleccionada); }
  .chip-status[data-state="activa"]       { background: var(--state-activa-soft);       color: var(--state-activa); }
  .chip-status[data-state="archivada"]    { background: var(--state-archivada-soft);    color: var(--ink-3); }
  .chip-status .dot { width: 6px; height: 6px; }

  /* ── Misc ───────────────────────────────────────────────────────── */
  .row-hover { transition: background .12s ease; }
  .row-hover:hover { background: var(--paper-2); }
  ::selection { background: var(--ink); color: var(--paper); }

  .field {
    width: 100%; padding: 10px 12px; border-radius: 8px;
    border: 1px solid var(--rule-2); background: var(--paper);
    color: var(--ink); font-size: 14px; font-family: inherit;
    transition: border-color .12s ease, background .12s ease;
  }
  .field:focus { outline: none; border-color: var(--ink); background: var(--paper); }
  .field::placeholder { color: var(--ink-4); }
  textarea.field { resize: vertical; min-height: 80px; }

  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 999px;
    border: 1px solid var(--rule-2);
    font-size: 12px; color: var(--ink-2);
    cursor: pointer; transition: all .12s ease;
    background: transparent; font-family: inherit;
  }
  .chip:hover { border-color: var(--ink-3); }
  .chip.on { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  /* Orientation chips: hue-tinted soft fill, colored text. Each carries a
     leading dot so the relationship to data-orient is explicit. Selected
     state is the same hue but with stronger fill + ink-readable text. */
  .chip-orient {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 4px 11px 4px 9px; border-radius: 999px;
    font-size: 12px; font-weight: 600; letter-spacing: 0.01em;
    line-height: 1; white-space: nowrap;
    border: 1px solid transparent;
    background: var(--paper-2); color: var(--ink-2);
    cursor: pointer; transition: all .12s ease;
    font-family: inherit;
  }
  .chip-orient::before {
    content: ''; width: 7px; height: 7px; border-radius: 999px;
    background: var(--ink-4);
  }
  .chip-orient[data-orient="clinica"]     { background: var(--orient-clinica-soft);     color: var(--orient-clinica); }
  .chip-orient[data-orient="educacional"] { background: var(--orient-educacional-soft); color: var(--orient-educacional); }
  .chip-orient[data-orient="laboral"]     { background: var(--orient-laboral-soft);     color: var(--orient-laboral); }
  .chip-orient[data-orient="comunitaria"] { background: var(--orient-comunitaria-soft); color: var(--orient-comunitaria); }
  .chip-orient[data-orient="clinica"]::before     { background: var(--orient-clinica); }
  .chip-orient[data-orient="educacional"]::before { background: var(--orient-educacional); }
  .chip-orient[data-orient="laboral"]::before     { background: var(--orient-laboral); }
  .chip-orient[data-orient="comunitaria"]::before { background: var(--orient-comunitaria); }

  /* Off-state (form picker — orientations NOT yet selected) */
  .chip-orient.off {
    background: transparent; color: var(--ink-3);
    border: 1px solid var(--rule-2);
  }
  .chip-orient.off:hover { border-color: var(--ink-3); color: var(--ink-2); }
  .chip-orient.off::before { background: var(--ink-4); opacity: 0.5; }
  .chip-orient.off[data-orient="clinica"]:hover     { color: var(--orient-clinica);     border-color: var(--orient-clinica); }
  .chip-orient.off[data-orient="clinica"]:hover::before     { background: var(--orient-clinica);     opacity: 1; }
  .chip-orient.off[data-orient="educacional"]:hover { color: var(--orient-educacional); border-color: var(--orient-educacional); }
  .chip-orient.off[data-orient="educacional"]:hover::before { background: var(--orient-educacional); opacity: 1; }
  .chip-orient.off[data-orient="laboral"]:hover     { color: var(--orient-laboral);     border-color: var(--orient-laboral); }
  .chip-orient.off[data-orient="laboral"]:hover::before     { background: var(--orient-laboral);     opacity: 1; }
  .chip-orient.off[data-orient="comunitaria"]:hover { color: var(--orient-comunitaria); border-color: var(--orient-comunitaria); }
  .chip-orient.off[data-orient="comunitaria"]:hover::before { background: var(--orient-comunitaria); opacity: 1; }

  /* Mini dot just for orientation, exposed on side rows so the list reads
     "which kind of PPS is this" at a glance. */
  .dot-orient-clinica     { background: var(--orient-clinica); }
  .dot-orient-educacional { background: var(--orient-educacional); }
  .dot-orient-laboral     { background: var(--orient-laboral); }
  .dot-orient-comunitaria { background: var(--orient-comunitaria); }

  /* ── Sidebar rows ───────────────────────────────────────────────── */
  .side-row {
    display: grid; grid-template-columns: 6px 1fr auto; gap: 10px;
    padding: 9px 14px 9px 10px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: background .12s ease, border-color .12s ease;
    align-items: center; min-width: 0;
  }
  .side-row:hover { background: var(--paper-2); }
  .side-row.active { background: var(--paper-2); border-left-color: var(--ink); }
  .side-row.active .side-row-title { color: var(--ink); }

  /* ── Scrollbar ──────────────────────────────────────────────────── */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--rule-2); border-radius: 999px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--ink-4); }

  /* ── AI shimmer ─────────────────────────────────────────────────── */
  @keyframes shimmer {
    0% { background-position: -200px 0; }
    100% { background-position: 200px 0; }
  }
  .ai-thinking {
    background: linear-gradient(90deg, var(--ai-soft) 0%, var(--paper-2) 50%, var(--ai-soft) 100%);
    background-size: 400px 100%;
    animation: shimmer 1.6s infinite linear;
  }

  /* ── Step / status rail ─────────────────────────────────────────── */
  /* Old `.step` is kept for back-compat — restyled tighter, sans-only */
  .step {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--ink-3); font-weight: 500;
  }
  .step-num {
    width: 20px; height: 20px; border-radius: 999px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 10.5px; font-family: 'JetBrains Mono', monospace; font-weight: 600;
    background: transparent; color: var(--ink-4);
    border: 1px solid var(--rule-2);
  }
  .step.done .step-num { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .step.active .step-num { background: var(--paper); color: var(--ink); border: 1.5px solid var(--ink); }
  .step.active { color: var(--ink); font-weight: 600; }
  .step.done { color: var(--ink-2); }
  .step-bar { width: 24px; height: 1px; background: var(--rule-2); }
  .step-bar.done { background: var(--ink); }

  /* New: pipeline-style status rail (when we want a richer step indicator) */
  .pipeline { display: flex; align-items: stretch; gap: 0; border: 1px solid var(--rule-2); border-radius: 10px; overflow: hidden; }
  .pipeline-step {
    flex: 1; padding: 10px 14px; min-width: 0;
    display: flex; flex-direction: column; gap: 4px;
    border-right: 1px solid var(--rule-2);
    background: var(--paper);
    cursor: pointer; transition: background .12s ease;
  }
  .pipeline-step:last-child { border-right: none; }
  .pipeline-step:hover { background: var(--paper-2); }
  .pipeline-step.done { background: var(--paper); color: var(--ink-3); }
  .pipeline-step.active { background: var(--ink); color: var(--paper); }
  .pipeline-step.active .label,
  .pipeline-step.active .meta { color: var(--paper); opacity: .82; }
  .pipeline-step .step-label { font-size: 13px; font-weight: 600; letter-spacing: -0.01em; }
  .pipeline-step .step-meta  { font-size: 10.5px; font-family: 'JetBrains Mono', monospace; opacity: .7; }

  /* ── Focus ──────────────────────────────────────────────────────── */
  button:focus-visible, a:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }
  .press:active { transform: translateY(0.5px); }

  /* ── Responsive ─────────────────────────────────────────────────── */
  @media (max-width: 1180px) {
    .wordmark-sub { display: none; }
    .topbar-search-label { display: none; }
  }
  @media (max-width: 960px) {
    .topbar-user { display: none !important; }
    .topbar-kbd { display: none; }
  }
  @media (max-width: 820px) {
    .topbar-tabs { display: none !important; }
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

</head>
