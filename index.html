    <!-- Tailwind Config for Development/Preview (Removed in Prod by prep-github script) -->
    <!-- Tailwind CDN removed for production build -->
    <script>
      if (typeof tailwind !== "undefined") {
        tailwind.config = { darkMode: "class" };
      }
    </script>

    <!-- Dark mode init -->
    <script>
      if (
        localStorage.getItem("theme") === "dark" ||
        (!("theme" in localStorage) && window.matchMedia("(prefers-color-scheme: dark)").matches)
      ) {
        document.documentElement.classList.add("dark");
      } else {
        document.documentElement.classList.remove("dark");
      }
    </script>

    <!-- Anti-FOUC: evita el "flash" de estilo viejo mientras cargan las fuentes
         de marca (Bricolage Grotesque / Manrope / Geist). Mantenemos el contenido
         oculto sobre un fondo neutro acorde al tema hasta que las tipografías estén
         listas (o tras un máximo de seguridad), y recién ahí se revela ya con el
         estilo final. Así el usuario nunca ve el render con la fuente del sistema. -->
    <style id="pps-anti-fouc">
      html.fonts-loading body {
        visibility: hidden;
      }
      html.fonts-loading {
        background-color: #fafaf7;
      }
      html.fonts-loading.dark {
        background-color: #0e0e0c;
      }
    </style>
    <script>
      (function () {
        var docEl = document.documentElement;
        docEl.classList.add("fonts-loading");
        var revealed = false;
        function reveal() {
          if (revealed) return;
          revealed = true;
          docEl.classList.remove("fonts-loading");
        }
        // Failsafe: nunca dejar la página oculta más de 1.2s, pase lo que pase.
        var failsafe = setTimeout(reveal, 1200);
        function done() {
          clearTimeout(failsafe);
          reveal();
        }
        if (document.fonts && document.fonts.load) {
          Promise.all([
            document.fonts.load("600 1em 'Bricolage Grotesque'"),
            document.fonts.load("500 1em 'Geist'"),
            document.fonts.load("700 1em 'Manrope'"),
          ]).then(done, done);
        } else {
          window.addEventListener("load", done);
        }
      })();
    </script>
